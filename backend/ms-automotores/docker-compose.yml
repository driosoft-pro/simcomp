version: '3.8'

services:
  db-ms-automotores:
    #image: postgres:16                     # Usar para docker
    image: docker.io/library/postgres:16    # Usar para podman
    container_name: db-ms-automotores
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTOMOTORES_DB_USER:-automotores_user}
      POSTGRES_PASSWORD: ${AUTOMOTORES_DB_PASSWORD:-automotores_pass}
      POSTGRES_DB: ${AUTOMOTORES_DB_NAME:-automotores_db}
    ports:
      - "${AUTOMOTORES_DB_PORT:-5434}:5432"
    volumes:
      - automotores_data:/var/lib/postgresql/data
      - ./db/ms-automotores/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTOMOTORES_DB_USER:-automotores_user} -d ${AUTOMOTORES_DB_NAME:-automotores_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  automotores_data: