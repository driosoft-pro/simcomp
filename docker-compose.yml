services:
  # Databases
  db-auth:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./backend/ms-auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-personas:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: personas_db
    ports:
      - "5433:5432"
    volumes:
      - personas_db_data:/var/lib/postgresql/data
      - ./backend/ms-personas/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-automotores:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: automotores_db
    ports:
      - "5434:5432"
    volumes:
      - automotores_db_data:/var/lib/postgresql/data
      - ./backend/ms-automotores/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-infracciones:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: infracciones_db
    ports:
      - "5435:5432"
    volumes:
      - infracciones_db_data:/var/lib/postgresql/data
      - ./backend/ms-infracciones/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-comparendos:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: comparendos_db
    ports:
      - "5436:5432"
    volumes:
      - comparendos_db_data:/var/lib/postgresql/data
      - ./backend/ms-comparendos/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # Microservices
  ms-auth-service:
    build: ./backend/ms-auth-service
    environment:
      - PORT=8001
      - DB_HOST=db-auth
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_DAYS=${JWT_REFRESH_EXPIRES_DAYS}
      - PERSONAS_SERVICE_URL=http://ms-personas:8002
    ports:
      - "8001:8001"
    volumes:
      - ./backend/ms-auth-service:/app
      - /app/node_modules
    depends_on:
      - db-auth

  ms-personas:
    build: ./backend/ms-personas
    environment:
      - PORT=8002
      - DB_HOST=db-personas
      - DB_PORT=5432
      - DB_NAME=personas_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_SERVICE_URL=http://ms-auth-service:8001
    ports:
      - "8002:8002"
    volumes:
      - ./backend/ms-personas:/app
      - /app/node_modules
    depends_on:
      - db-personas

  ms-automotores:
    build: ./backend/ms-automotores
    environment:
      - PORT=8003
      - DB_HOST=db-automotores
      - DB_PORT=5432
      - DB_NAME=automotores_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PERSONAS_SERVICE_URL=${PERSONAS_SERVICE_URL}
    ports:
      - "8003:8003"
    depends_on:
      - db-automotores

  ms-infracciones:
    build: ./backend/ms-infracciones
    environment:
      - PORT=8004
      - DB_HOST=db-infracciones
      - DB_PORT=5432
      - DB_NAME=infracciones_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8004:8004"
    depends_on:
      - db-infracciones

  ms-comparendos:
    build: ./backend/ms-comparendos
    environment:
      - PORT=8005
      - DB_HOST=db-comparendos
      - DB_PORT=5432
      - DB_NAME=comparendos_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PERSONAS_SERVICE_URL=${PERSONAS_SERVICE_URL}
      - AUTOMOTORES_SERVICE_URL=${AUTOMOTORES_SERVICE_URL}
      - INFRACCIONES_SERVICE_URL=${INFRACCIONES_SERVICE_URL}
    ports:
      - "8005:8005"
    depends_on:
      - db-comparendos

  ms-reportes:
    build: ./backend/ms-reportes
    environment:
      - PORT=8006
      - AUTH_SERVICE_URL=http://ms-auth-service:8001
      - PERSONAS_SERVICE_URL=http://ms-personas:8002
      - AUTOMOTORES_SERVICE_URL=http://ms-automotores:8003
      - INFRACCIONES_SERVICE_URL=http://ms-infracciones:8004
      - COMPARENDOS_SERVICE_URL=http://ms-comparendos:8005
    ports:
      - "8006:8006"

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - gateway

  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms-auth-service
      - ms-personas
      - ms-automotores
      - ms-infracciones
      - ms-comparendos
      - ms-reportes

volumes:
  auth_db_data:
  personas_db_data:
  automotores_db_data:
  infracciones_db_data:
  comparendos_db_data:
