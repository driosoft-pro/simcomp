---
# =============================================================================
# SIMCOMP — Playbook de verificación
# Uso: ansible-playbook provisioning/verify.yml -i provisioning/hosts.ini
# =============================================================================

- name: Verificar svr-dns
  hosts: svr-dns
  become: true
  tasks:
    - name: Estado del servicio named
      ansible.builtin.systemd:
        name: named
      register: named_st
    - name: Resolución DNS simcomp.co
      ansible.builtin.command: dig @192.168.100.2 simcomp.co +short
      register: dns_co
      changed_when: false
    - name: Resolución DNS api.simcomp.co
      ansible.builtin.command: dig @192.168.100.2 api.simcomp.co +short
      register: dns_api
      changed_when: false
    - name: Resultado svr-dns
      ansible.builtin.debug:
        msg:
          - "named={{ named_st.status.ActiveState }}"
          - "simcomp.co → {{ dns_co.stdout }}"
          - "api.simcomp.co → {{ dns_api.stdout }}"

- name: Verificar svr-api (5 microservicios)
  hosts: svr-api
  tasks:
    - name: Health check auth-service :3001
      ansible.builtin.uri:
        url: http://localhost:3001/api/health
        status_code: 200
      register: h_auth
    - name: Health check personas-service :3002
      ansible.builtin.uri:
        url: http://localhost:3002/api/health
        status_code: 200
      register: h_per
    - name: Health check vehiculos-service :3003
      ansible.builtin.uri:
        url: http://localhost:3003/api/health
        status_code: 200
      register: h_veh
    - name: Health check infracciones-service :3004
      ansible.builtin.uri:
        url: http://localhost:3004/api/health
        status_code: 200
      register: h_inf
    - name: Health check comparendos-service :3005
      ansible.builtin.uri:
        url: http://localhost:3005/api/health
        status_code: 200
      register: h_cmp
    - name: Estado PM2
      ansible.builtin.command: pm2 list
      become: false
      become_user: vagrant
      register: pm2_st
      changed_when: false
    - name: Resultado svr-api
      ansible.builtin.debug:
        msg:
          - "auth-service         :3001 → {{ h_auth.status }} "
          - "personas-service     :3002 → {{ h_per.status }} "
          - "vehiculos-service    :3003 → {{ h_veh.status }} "
          - "infracciones-service :3004 → {{ h_inf.status }} "
          - "comparendos-service  :3005 → {{ h_cmp.status }} "

- name: Verificar svr-web (Nginx + API Gateway)
  hosts: svr-web
  tasks:
    - name: Estado Nginx
      ansible.builtin.systemd:
        name: nginx
      register: nginx_st
    - name: Frontend HTTP
      ansible.builtin.uri:
        url: http://localhost
        status_code: [200, 301, 302]
      register: web_r
    - name: Gateway sin token debe responder 401
      ansible.builtin.uri:
        url: http://localhost/api/personas
        status_code: 401
      register: gw_r
    - name: Resultado svr-web
      ansible.builtin.debug:
        msg:
          - "nginx={{ nginx_st.status.ActiveState }}"
          - "frontend HTTP={{ web_r.status }} "
          - "gateway sin JWT → 401 "