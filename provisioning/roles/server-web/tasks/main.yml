---
# =============================================================================
# SIMCOMP — Rol: server-web  (svr-web 192.168.100.4)
# Nginx como API Gateway con validación JWT + servidor React SPA
#
# Upstreams (una VM por servicio, red 192.168.100.x):
#   auth-service        192.168.100.3:3001  ← subrequest de validación JWT
#   personas-service    192.168.100.3:3002
#   vehiculos-service   192.168.100.3:3003
#   infracciones-service 192.168.100.3:3004
#   comparendos-service  192.168.100.3:3005
#
# Rutas PÚBLICAS (sin JWT):
#   POST /api/auth/login
#   POST /api/auth/refresh
#   POST /api/auth/register
#
# Rutas PROTEGIDAS (Nginx valida JWT via auth_request antes de enrutar):
#   /api/personas/*   /api/vehiculos/*
#   /api/infracciones/*   /api/comparendos/*
# =============================================================================

# ── 1. Instalar Nginx ─────────────────────────────────────────────────────────
- name: Actualizar caché apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar Nginx y utilidades
  ansible.builtin.apt:
    name: [nginx, curl, ufw]
    state: present

# ── 2. Directorio web ─────────────────────────────────────────────────────────
- name: Crear /var/www/simcomp
  ansible.builtin.file:
    path: /var/www/simcomp
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

# ── 3. Copiar build del frontend ──────────────────────────────────────────────
- name: Verificar existencia de /vagrant/frontend/dist/index.html
  ansible.builtin.stat:
    path: /vagrant/frontend/dist/index.html
  register: frontend_build

- name: Advertir si no hay build disponible
  ansible.builtin.debug:
    msg: >
      ⚠️  No se encontró frontend/dist/. Ejecuta 'npm run build' en
      la carpeta frontend/ local y luego corre 'vagrant provision svr-web'.
  when: not frontend_build.stat.exists

- name: Copiar build React a /var/www/simcomp
  ansible.builtin.copy:
    src: /vagrant/frontend/dist/
    dest: /var/www/simcomp/
    owner: www-data
    group: www-data
    mode: preserve
    force: true
  when: frontend_build.stat.exists

# ── 4. Configurar Nginx ───────────────────────────────────────────────────────
- name: Eliminar configuración default de Nginx
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Crear configuración Nginx para SIMCOMP
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/simcomp
    owner: root
    group: root
    mode: "0644"
    content: |
      # ================================================================
      # SIMCOMP — Nginx: API Gateway JWT + Frontend
      # svr-web: 192.168.100.20
      #
      # Arquitectura de red (una VM por servicio):
      #   auth-service        → 192.168.100.3:3001
      #   personas-service    → 192.168.100.3:3002
      #   vehiculos-service   → 192.168.100.3:3003
      #   infracciones-service→ 192.168.100.3:3004
      #   comparendos-service → 192.168.100.3:3005
      #
      # Flujo JWT:
      #   1. Cliente envía: Authorization: Bearer <access_token>
      #   2. Nginx hace subrequest POST /_auth_validate → auth-service
      #   3. auth-service: 200 OK (+ X-User-ID, X-User-Role) o 401
      #   4. Nginx enruta o rechaza según respuesta
      # ================================================================

      upstream auth_backend        { server 192.168.100.3:3001; keepalive 16; }
      upstream personas_backend    { server 192.168.100.3:3002; keepalive 16; }
      upstream vehiculos_backend   { server 192.168.100.3:3003; keepalive 16; }
      upstream infracciones_backend{ server 192.168.100.3:3004; keepalive 16; }
      upstream comparendos_backend { server 192.168.100.3:3005; keepalive 16; }

      # ── Servidor principal: simcomp.co ─────────────────────────────
      server {
          listen 80;
          server_name simcomp.co www.simcomp.co 192.168.100.4;

          root  /var/www/simcomp;
          index index.html;

          add_header X-Frame-Options        "SAMEORIGIN"    always;
          add_header X-Content-Type-Options "nosniff"       always;
          add_header X-XSS-Protection       "1; mode=block" always;

          # ── Subrequest interno de validación JWT ───────────────────
          location = /_auth_validate {
              internal;
              proxy_pass              http://auth_backend/api/auth/validate;
              proxy_method            POST;
              proxy_pass_request_body off;
              proxy_set_header        Content-Length    "";
              proxy_set_header        X-Original-URI    $request_uri;
              proxy_set_header        X-Original-Method $request_method;
              proxy_set_header        Authorization     $http_authorization;
              proxy_read_timeout      5s;
              proxy_connect_timeout   3s;
          }

          # ── Rutas PÚBLICAS: auth ───────────────────────────────────
          location /api/auth {
              proxy_pass         http://auth_backend;
              proxy_http_version 1.1;
              proxy_set_header   Host            $host;
              proxy_set_header   X-Real-IP       $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 30s;

              add_header Access-Control-Allow-Origin      "$http_origin"                           always;
              add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers     "Content-Type, Authorization"            always;
              add_header Access-Control-Allow-Credentials "true"                                   always;
              if ($request_method = OPTIONS) { return 204; }
          }

          # ── Rutas PROTEGIDAS: personas ─────────────────────────────
          location /api/personas {
              auth_request     /_auth_validate;
              auth_request_set $auth_user_id $upstream_http_x_user_id;
              auth_request_set $auth_role    $upstream_http_x_user_role;
              error_page 401 = @unauthorized;
              error_page 403 = @forbidden;

              proxy_pass         http://personas_backend;
              proxy_http_version 1.1;
              proxy_set_header   Host            $host;
              proxy_set_header   X-Real-IP       $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-User-ID       $auth_user_id;
              proxy_set_header   X-User-Role     $auth_role;
              proxy_read_timeout 60s;

              add_header Access-Control-Allow-Origin      "$http_origin"                           always;
              add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers     "Content-Type, Authorization"            always;
              add_header Access-Control-Allow-Credentials "true"                                   always;
              if ($request_method = OPTIONS) { return 204; }
          }

          # ── Rutas PROTEGIDAS: vehiculos ────────────────────────────
          location /api/vehiculos {
              auth_request     /_auth_validate;
              auth_request_set $auth_user_id $upstream_http_x_user_id;
              auth_request_set $auth_role    $upstream_http_x_user_role;
              error_page 401 = @unauthorized;
              error_page 403 = @forbidden;

              proxy_pass         http://vehiculos_backend;
              proxy_http_version 1.1;
              proxy_set_header   Host            $host;
              proxy_set_header   X-Real-IP       $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-User-ID       $auth_user_id;
              proxy_set_header   X-User-Role     $auth_role;
              proxy_read_timeout 60s;

              add_header Access-Control-Allow-Origin      "$http_origin"                           always;
              add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers     "Content-Type, Authorization"            always;
              add_header Access-Control-Allow-Credentials "true"                                   always;
              if ($request_method = OPTIONS) { return 204; }
          }

          # ── Rutas PROTEGIDAS: infracciones ─────────────────────────
          location /api/infracciones {
              auth_request     /_auth_validate;
              auth_request_set $auth_user_id $upstream_http_x_user_id;
              auth_request_set $auth_role    $upstream_http_x_user_role;
              error_page 401 = @unauthorized;
              error_page 403 = @forbidden;

              proxy_pass         http://infracciones_backend;
              proxy_http_version 1.1;
              proxy_set_header   Host            $host;
              proxy_set_header   X-Real-IP       $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-User-ID       $auth_user_id;
              proxy_set_header   X-User-Role     $auth_role;
              proxy_read_timeout 60s;

              add_header Access-Control-Allow-Origin      "$http_origin"                           always;
              add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers     "Content-Type, Authorization"            always;
              add_header Access-Control-Allow-Credentials "true"                                   always;
              if ($request_method = OPTIONS) { return 204; }
          }

          # ── Rutas PROTEGIDAS: comparendos ──────────────────────────
          location /api/comparendos {
              auth_request     /_auth_validate;
              auth_request_set $auth_user_id $upstream_http_x_user_id;
              auth_request_set $auth_role    $upstream_http_x_user_role;
              error_page 401 = @unauthorized;
              error_page 403 = @forbidden;

              proxy_pass         http://comparendos_backend;
              proxy_http_version 1.1;
              proxy_set_header   Host            $host;
              proxy_set_header   X-Real-IP       $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-User-ID       $auth_user_id;
              proxy_set_header   X-User-Role     $auth_role;
              proxy_read_timeout 60s;

              add_header Access-Control-Allow-Origin      "$http_origin"                           always;
              add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Allow-Headers     "Content-Type, Authorization"            always;
              add_header Access-Control-Allow-Credentials "true"                                   always;
              if ($request_method = OPTIONS) { return 204; }
          }

          # ── Errores de autenticación ───────────────────────────────
          location @unauthorized {
              default_type application/json;
              return 401 '{"error":"No autorizado","message":"Token requerido o inválido"}';
          }
          location @forbidden {
              default_type application/json;
              return 403 '{"error":"Prohibido","message":"Sin permisos para este recurso"}';
          }

          # ── Swagger Docs (sin auth) ────────────────────────────────
          location /docs/auth         { proxy_pass http://auth_backend/api/docs;         }
          location /docs/personas     { proxy_pass http://personas_backend/api/docs;     }
          location /docs/vehiculos    { proxy_pass http://vehiculos_backend/api/docs;    }
          location /docs/infracciones { proxy_pass http://infracciones_backend/api/docs; }
          location /docs/comparendos  { proxy_pass http://comparendos_backend/api/docs;  }

          # ── React SPA (catch-all) ──────────────────────────────────
          location / {
              try_files $uri $uri/ /index.html;
          }

          # ── Cache de assets estáticos ──────────────────────────────
          location ~* \.(js|css|png|jpg|ico|svg|woff|woff2)$ {
              expires 30d;
              add_header Cache-Control "public, no-transform";
              try_files $uri =404;
          }

          error_page 502 503 504 /50x.html;
          location = /50x.html { root /usr/share/nginx/html; }

          access_log /var/log/nginx/simcomp-access.log;
          error_log  /var/log/nginx/simcomp-error.log warn;
      }

      # ── api.simcomp.co (acceso directo a la API) ───────────────────
      server {
          listen 80;
          server_name api.simcomp.co;

          location = /_auth_validate {
              internal;
              proxy_pass              http://auth_backend/api/auth/validate;
              proxy_method            POST;
              proxy_pass_request_body off;
              proxy_set_header        Content-Length "";
              proxy_set_header        Authorization  $http_authorization;
              proxy_read_timeout      5s;
          }

          location /api/auth        { proxy_pass http://auth_backend;         proxy_http_version 1.1; proxy_set_header Host $host; add_header Access-Control-Allow-Origin "*" always; add_header Access-Control-Allow-Headers "Content-Type, Authorization" always; if ($request_method = OPTIONS) { return 204; } }
          location /api/personas    { auth_request /_auth_validate; error_page 401 = @unauth_api; proxy_pass http://personas_backend;     proxy_http_version 1.1; proxy_set_header Host $host; add_header Access-Control-Allow-Origin "*" always; add_header Access-Control-Allow-Headers "Content-Type, Authorization" always; if ($request_method = OPTIONS) { return 204; } }
          location /api/vehiculos   { auth_request /_auth_validate; error_page 401 = @unauth_api; proxy_pass http://vehiculos_backend;    proxy_http_version 1.1; proxy_set_header Host $host; add_header Access-Control-Allow-Origin "*" always; add_header Access-Control-Allow-Headers "Content-Type, Authorization" always; if ($request_method = OPTIONS) { return 204; } }
          location /api/infracciones{ auth_request /_auth_validate; error_page 401 = @unauth_api; proxy_pass http://infracciones_backend; proxy_http_version 1.1; proxy_set_header Host $host; add_header Access-Control-Allow-Origin "*" always; add_header Access-Control-Allow-Headers "Content-Type, Authorization" always; if ($request_method = OPTIONS) { return 204; } }
          location /api/comparendos { auth_request /_auth_validate; error_page 401 = @unauth_api; proxy_pass http://comparendos_backend;  proxy_http_version 1.1; proxy_set_header Host $host; add_header Access-Control-Allow-Origin "*" always; add_header Access-Control-Allow-Headers "Content-Type, Authorization" always; if ($request_method = OPTIONS) { return 204; } }

          location @unauth_api { default_type application/json; return 401 '{"error":"No autorizado"}'; }

          access_log /var/log/nginx/simcomp-api-access.log;
          error_log  /var/log/nginx/simcomp-api-error.log warn;
      }

- name: Activar sitio SIMCOMP en Nginx
  ansible.builtin.file:
    src: /etc/nginx/sites-available/simcomp
    dest: /etc/nginx/sites-enabled/simcomp
    state: link

- name: Validar configuración Nginx
  ansible.builtin.command: nginx -t
  register: nginx_test
  changed_when: false

- name: Habilitar y reiniciar Nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    enabled: true
    daemon_reload: true

# ── 5. Firewall ───────────────────────────────────────────────────────────────
- name: Permitir SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Permitir HTTP
  community.general.ufw:
    rule: allow
    name: "Nginx HTTP"

- name: Habilitar UFW
  community.general.ufw:
    state: enabled
    policy: deny

# ── 6. DNS ────────────────────────────────────────────────────────────────────
- name: Configurar resolv.conf para usar svr-dns
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      search simcomp.co
      nameserver 192.168.100.2
      nameserver 8.8.8.8
    mode: "0644"

# ── 7. Verificación final ─────────────────────────────────────────────────────
- name: Crear index.html temporal si no hay build de React
  ansible.builtin.copy:
    dest: /var/www/simcomp/index.html
    owner: www-data
    group: www-data
    mode: "0644"
    content: |
      <!DOCTYPE html>
      <html>
        <head><title>SIMCOMP</title></head>
        <body>
          <h1>SIMCOMP - Infraestructura lista</h1>
          <p>Frontend pendiente de build. Ejecuta npm run build en frontend/ y re-provisiona.</p>
        </body>
      </html>
    force: false
  when: not frontend_build.stat.exists

- name: Verificar respuesta HTTP de Nginx
  ansible.builtin.uri:
    url: http://localhost
    method: GET
    status_code: [200, 301, 302, 403]
  failed_when: false

- name: Resumen final svr-web
  ansible.builtin.debug:
    msg:
      - "Nginx activo como API Gateway"
      - "Rutas públicas: /api/auth/login, /api/auth/refresh, /api/auth/register"
      - "Rutas protegidas: /api/personas, /api/vehiculos, /api/infracciones, /api/comparendos"
      - "Frontend disponible en http://simcomp.co"
      - "{% if not frontend_build.stat.exists %}  Sin build React — ejecuta npm run build y re-provisiona{% endif %}"