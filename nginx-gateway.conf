worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;

    # Helper for Auth Validation
    map $request_uri $target_service {
        ~^/api/personas/      ms-personas:8002;
        ~^/api/vehiculos/     ms-automotores:8003;
        ~^/api/infracciones/  ms-infracciones:8004;
        ~^/api/comparendos/   ms-comparendos:8005;
    }

    # Internal Auth Validation Subrequest
    server {
        listen 80;
        server_name internal-auth;

        location /_auth_validate {
            proxy_pass http://ms-auth-service:8001/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }
    }

    # Port 3001: Auth (Public)
    server {
        listen 3001;
        location /api/auth/ {
            proxy_pass http://ms-auth-service:8001;
        }
        location /api/docs {
            proxy_pass http://ms-auth-service:8001/api/docs;
        }
    }

    # Port 3002: Personas (Protected)
    server {
        listen 3002;
        location /api/personas/ {
            auth_request /_auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_pass http://ms-personas:8002;
        }
        location /api/docs {
            proxy_pass http://ms-personas:8002/api/docs;
        }
        location = /_auth_validate {
            internal;
            proxy_pass http://ms-auth-service:8001/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Method $request_method;
        }
    }

    # Port 3003: Automotores (Protected)
    server {
        listen 3003;
        location /api/automotores/ {
            auth_request /_auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_pass http://ms-automotores:8003;
        }
        location /api/docs {
            proxy_pass http://ms-automotores:8003/api/docs;
        }
        location = /_auth_validate {
            internal;
            proxy_pass http://ms-auth-service:8001/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Method $request_method;
        }
    }

    # Port 3004: Infracciones (Protected)
    server {
        listen 3004;
        location /api/infracciones/ {
            auth_request /_auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_pass http://ms-infracciones:8004;
        }
        location /api/docs {
            proxy_pass http://ms-infracciones:8004/api/docs;
        }
        location = /_auth_validate {
            internal;
            proxy_pass http://ms-auth-service:8001/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Method $request_method;
        }
    }

    # Port 3005: Comparendos (Protected)
    server {
        listen 3005;
        location /api/comparendos/ {
            auth_request /_auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_username $upstream_http_x_user_username;
            auth_request_set $user_email $upstream_http_x_user_email;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Username $user_username;
            proxy_set_header X-User-Email $user_email;
            proxy_pass http://ms-comparendos:8005;
        }
        location /api/docs {
            proxy_pass http://ms-comparendos:8005/api/docs;
        }
        location = /_auth_validate {
            internal;
            proxy_pass http://ms-auth-service:8001/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Method $request_method;
        }
    }
}
