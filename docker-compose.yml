services:
  # Databases
  db-auth:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: usuarios_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./backend/ms-auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-personas:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: personas_db
    ports:
      - "5433:5432"
    volumes:
      - personas_db_data:/var/lib/postgresql/data
      - ./backend/ms-personas/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-automotores:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vehiculos_db
    ports:
      - "5434:5432"
    volumes:
      - automotores_db_data:/var/lib/postgresql/data
      - ./backend/ms-automotores/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-infracciones:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: infracciones_db
    ports:
      - "5435:5432"
    volumes:
      - infracciones_db_data:/var/lib/postgresql/data
      - ./backend/ms-infracciones/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db-comparendos:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: comparendos_db
    ports:
      - "5436:5432"
    volumes:
      - comparendos_db_data:/var/lib/postgresql/data
      - ./backend/ms-comparendos/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # Microservices
  ms-auth-service:
    build: ./backend/ms-auth-service
    environment:
      - PORT=8001
      - DB_HOST=db-auth
      - DB_PORT=5432
      - DB_NAME=usuarios_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
    depends_on:
      - db-auth

  ms-personas:
    build: ./backend/ms-personas
    environment:
      - PORT=8002
      - DB_HOST=db-personas
      - DB_PORT=5432
      - DB_NAME=personas_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db-personas

  ms-automotores:
    build: ./backend/ms-automotores
    environment:
      - PORT=8003
      - DB_HOST=db-automotores
      - DB_PORT=5432
      - DB_NAME=vehiculos_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PERSONAS_SERVICE_URL=${PERSONAS_SERVICE_URL}
    depends_on:
      - db-automotores

  ms-infracciones:
    build: ./backend/ms-infracciones
    environment:
      - PORT=8004
      - DB_HOST=db-infracciones
      - DB_PORT=5432
      - DB_NAME=infracciones_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db-infracciones

  ms-comparendos:
    build: ./backend/ms-comparendos
    environment:
      - PORT=8005
      - DB_HOST=db-comparendos
      - DB_PORT=5432
      - DB_NAME=comparendos_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PERSONAS_SERVICE_URL=${PERSONAS_SERVICE_URL}
      - VEHICULOS_SERVICE_URL=${VEHICULOS_SERVICE_URL}
      - INFRACCIONES_SERVICE_URL=${INFRACCIONES_SERVICE_URL}
    depends_on:
      - db-comparendos

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - gateway

  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "3004:3004"
      - "3005:3005"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms-auth-service
      - ms-personas
      - ms-automotores
      - ms-infracciones
      - ms-comparendos

volumes:
  auth_db_data:
  personas_db_data:
  automotores_db_data:
  infracciones_db_data:
  comparendos_db_data:
