upstream frontend_upstream {
    server frontend:80;
}

upstream auth_upstream {
    server ms-auth-service:8001;
}

upstream personas_upstream {
    server ms-personas:8002;
}

upstream automotores_upstream {
    server ms-automotores:8003;
}

upstream infracciones_upstream {
    server ms-infracciones:8004;
}

upstream comparendos_upstream {
    server ms-comparendos:8005;
}

upstream reportes_upstream {
    server ms-reportes:8006;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth {
        proxy_pass http://auth_upstream/api/auth;
    }

    location /api/usuarios {
        proxy_pass http://auth_upstream/api/usuarios;
    }

    location /api/personas {
        proxy_pass http://personas_upstream/api/personas;
    }

    location /api/licencias {
        proxy_pass http://personas_upstream/api/licencias;
    }

    location /api/automotores {
        proxy_pass http://automotores_upstream/api/automotores;
    }

    location /api/infracciones {
        proxy_pass http://infracciones_upstream/api/infracciones;
    }

    location /api/comparendos {
        proxy_pass http://comparendos_upstream/api/comparendos;
    }

    location /api/reportes {
        proxy_pass http://reportes_upstream/api/reportes;
    }
}