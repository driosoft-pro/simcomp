services:
  db-ms-comparendos:
    image: docker.io/library/postgres:16
    container_name: db-ms-comparendos
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-comparendos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-comparendos_pass}
      POSTGRES_DB: ${DB_NAME:-comparendos_db}
    ports:
      - "${DB_PORT:-5436}:5432"
    volumes:
      - comparendos_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-comparendos_user} -d ${DB_NAME:-comparendos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  comparendos_db_data:

networks:
  microservices-net:
    driver: bridge
