project_name: simcomp
domain: simcomp.co

# ── IPs ───────────────────────────────────────────────────────────────────────
ip_dns: "192.168.100.2"
ip_api: "192.168.100.3"
ip_web: "192.168.100.4"

# ── Node.js / App ─────────────────────────────────────────────────────────────
node_version: "22"
node_user: vagrant
app_base_dir: /opt/simcomp

# ── PostgreSQL ────────────────────────────────────────────────────────────────
pg_version: "14"
pg_user: postgres
pg_password: "S1mc0mp@ss2025"

# ── JWT (compartido por los 5 servicios) ──────────────────────────────────────
jwt_secret: "S1mc0mpJWT$ecret2025!XyZ"
jwt_access_expiry: "15m"
jwt_refresh_expiry: "7d"

# ── Servicios (corren todos en srv-simcomp-api 192.168.100.3) ───────────────
services:
