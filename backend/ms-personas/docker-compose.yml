services:
  db-ms-personas:
    image: docker.io/library/postgres:16
    container_name: db-ms-personas
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-personas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-personas_pass}
      POSTGRES_DB: ${DB_NAME:-personas_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - personas_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-personas_user} -d ${DB_NAME:-personas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  personas_db_data:

networks:
  microservices-net:
    driver: bridge