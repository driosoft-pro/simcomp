---
# =============================================================================
# SIMCOMP — Playbook principal
# 3 VMs: svr-dns | svr-api | svr-web
# =============================================================================

- name: Aprovisionar svr-dns (BIND9 + zona simcomp.co)
  hosts: svr-dns
  become: true
  roles:
    - serve-dns

- name: Aprovisionar svr-api (PostgreSQL x5 + Node.js x5 + PM2)
  hosts: svr-api
  become: true
  roles:
    - serve-api

- name: Aprovisionar svr-web (Nginx API Gateway JWT + React SPA)
  hosts: svr-web
  become: true
  roles:
    - server-web