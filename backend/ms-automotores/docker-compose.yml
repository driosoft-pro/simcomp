services:
  db-ms-automotores:
    image: docker.io/library/postgres:16
    container_name: db-ms-automotores
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-automotores_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-automotores_pass}
      POSTGRES_DB: ${DB_NAME:-automotores_db}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - automotores_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-automotores_user} -d ${DB_NAME:-automotores_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  automotores_db_data:

networks:
  microservices-net:
    driver: bridge
