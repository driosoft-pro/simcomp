---
# Tasks for serve-api

- name: Actualizar caché apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar dependencias del sistema
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - build-essential
      - python3-psycopg2
      - acl
      - ufw
      - gnupg2
      - rsync
      - apt-transport-https
      - ca-certificates
    state: present

# ── PostgreSQL setup ──────────────────────────────────────────────────────────
- name: Descargar y agregar llave GPG de PostgreSQL
  ansible.builtin.shell: |
    curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
      | gpg --dearmor --yes -o /usr/share/keyrings/postgresql.gpg
  args:
    creates: /usr/share/keyrings/postgresql.gpg
  become: true

- name: Agregar repositorio oficial de PostgreSQL
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt jammy-pgdg main"
    state: present
    filename: pgdg
  become: true

- name: Instalar PostgreSQL 16
  ansible.builtin.apt:
    name:
      - postgresql-16
      - postgresql-contrib-16
      - libpq-dev
    state: present
    update_cache: true
  become: true

- name: Detener y eliminar cluster default (main) para liberar puerto 5432
  ansible.builtin.shell: pg_dropcluster --stop {{ pg_version }} main 2>/dev/null || true
  become: true
  changed_when: false

- name: Crear e iniciar cada cluster de PostgreSQL (Bypass systemd)
  ansible.builtin.shell: |
    set -e
    CLUSTER="{{ item.name | replace('-service', '') }}"
    PORT="{{ item.db_port }}"
    PG_VER="{{ pg_version }}"
    PGCONF="/etc/postgresql/$PG_VER/$CLUSTER"
    PGDATA="/var/lib/postgresql/$PG_VER/$CLUSTER"
    PGLOG="/var/log/postgresql/postgresql-$PG_VER-$CLUSTER.log"
    PGBIN="/usr/lib/postgresql/$PG_VER/bin"

    # 1. Crear cluster si no existe
    if [ ! -d "$PGCONF" ]; then
      pg_createcluster $PG_VER $CLUSTER --port=$PORT
    fi

    # 2. Configurar TCP listener (localhost)
    sed -i "s/^#*listen_addresses\s*=.*/listen_addresses = 'localhost'/" "$PGCONF/postgresql.conf"

    # 3. Arrancar el proceso directamente (como usuario postgres)
    if ! "$PGBIN/pg_ctl" -D "$PGDATA" status 2>/dev/null | grep -q 'server is running'; then
      su - postgres -c "$PGBIN/pg_ctl -D $PGDATA -o '-c config_file=$PGCONF/postgresql.conf' -l $PGLOG start -w -t 60"
    fi
  args:
    executable: /bin/bash
  loop: "{{ services }}"
  become: true
  changed_when: true

- name: Esperar a que los clusters acepten conexiones TCP
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ item.db_port }}"
    state: started
    timeout: 90
    delay: 10
  loop: "{{ services }}"

- name: Establecer contraseña del rol postgres en todos los clusters
  ansible.builtin.command: >
    psql -p {{ item.db_port }} -d postgres -c "ALTER USER postgres WITH PASSWORD '{{ pg_password }}';"
  become: true
  become_user: postgres
  loop: "{{ services }}"
  changed_when: false
  no_log: true

- name: Crear bases de datos de microservicios en sus respectivos clusters
  community.postgresql.postgresql_db:
    name: "{{ item.db }}"
    port: "{{ item.db_port }}"
    owner: postgres
    state: present
  become: true
  become_user: postgres
  loop: "{{ services }}"

- name: Configurar autenticación md5 en todos los clusters
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/{{ item.name | replace('-service', '') }}/pg_hba.conf"
    regexp: '^local\s+all\s+all\s+'
    line: "local   all             all                                     md5"
  loop: "{{ services }}"
  become: true
  notify: restart all postgres clusters

# ── Node.js & Tooling ─────────────────────────────────────────────────────────
- name: Instalar Node.js {{ node_version }} vía NodeSource
  block:
    - name: Añadir llave NodeSource
      ansible.builtin.apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present
    - name: Añadir repo NodeSource
      ansible.builtin.apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
    - name: Instalar nodejs
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

- name: Instalar PM2 globalmente
  community.general.npm:
    name: pm2
    global: true
    state: present

# ── Application Layout ────────────────────────────────────────────────────────
- name: Crear directorio base y carpetas de servicios
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ node_user }}"
    group: "{{ node_user }}"
    mode: "0755"
  loop:
    - "{{ app_base_dir }}"
    - "/var/log/simcomp"

- name: Crear directorios por servicio
  ansible.builtin.file:
    path: "{{ app_base_dir }}/{{ item.name }}"
    state: directory
    owner: "{{ node_user }}"
    group: "{{ node_user }}"
    mode: "0755"
  loop: "{{ services }}"

# ── Deployment Logic ──────────────────────────────────────────────────────────
- name: Copiar código fuente (excluyendo node_modules)
  ansible.builtin.command: >
    rsync -aq --exclude='node_modules'
    /vagrant/backend/{{ item.name }}/
    {{ app_base_dir }}/{{ item.name }}/
  loop: "{{ services }}"
  changed_when: true
  become: true

- name: Generar archivos .env
  ansible.builtin.template:
    src: server.env.j2
    dest: "{{ app_base_dir }}/{{ item.name }}/.env"
    owner: "{{ node_user }}"
    group: "{{ node_user }}"
    mode: "0600"
  loop: "{{ services }}"
  # no_log: true

- name: npm install en la VM
  community.general.npm:
    path: "{{ app_base_dir }}/{{ item.name }}"
    state: present
    production: true
  loop: "{{ services }}"

- name: Configurar PM2 Ecosystem
  ansible.builtin.template:
    src: ecosystem.config.js.j2
    dest: "{{ pm2_ecosystem }}"
    owner: "{{ node_user }}"
    group: "{{ node_user }}"
    mode: "0644"

# ── PM2 Lifecycle ─────────────────────────────────────────────────────────────
- name: Gestionar servicios con PM2
  become: true
  become_user: "{{ node_user }}"
  block:
    - name: Detener procesos anteriores
      ansible.builtin.shell: pm2 delete all || true
      changed_when: false

    - name: Iniciar servicios
      ansible.builtin.command: "pm2 start {{ pm2_ecosystem }}"
      changed_when: true

    - name: Guardar configuración
      ansible.builtin.command: pm2 save
      changed_when: true

# ── System Integration ────────────────────────────────────────────────────────
- name: Firewall rules (Microservicios y DBs)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 8001
    - 8002
    - 8003
    - 8004
    - 8005
    - 5432
    - 5433
    - 5434
    - 5435
    - 5436

- name: Habilitar UFW y permitir SSH
  block:
    - community.general.ufw:
        rule: allow
        name: OpenSSH
    - community.general.ufw:
        state: enabled
        policy: deny

- name: Configurar recursión DNS local
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      search {{ domain }}
      nameserver {{ ip_dns }}
      nameserver 8.8.8.8
    mode: "0644"