---
# Tasks for server-web

- name: Actualizar caché apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar dependencias del sistema y Node.js
  block:
    - name: Añadir llave NodeSource
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'
    - name: Añadir repo NodeSource
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
    - name: Instalar paquetes
      ansible.builtin.apt:
        name: [nginx, curl, ufw, rsync, nodejs]
        state: present
  become: true

- name: Crear directorio web
  ansible.builtin.file:
    path: "{{ frontend_dir }}"
    state: directory
    owner: "{{ node_user }}"
    group: "www-data"
    mode: "0755"
  become: true

- name: Aprovisionar código del Frontend y Construir
  block:
    - name: Copiar código fuente del Frontend
      ansible.builtin.command: >
        rsync -aq --exclude='node_modules' --exclude='dist'
        /vagrant/frontend/
        {{ frontend_dir }}/source/
      changed_when: true

    - name: Generar archivo .env para el Frontend
      ansible.builtin.template:
        src: frontend.env.j2
        dest: "{{ frontend_dir }}/source/.env"
        owner: "{{ node_user }}"
        group: "{{ node_user }}"
        mode: "0644"

    - name: npm install y build
      ansible.builtin.shell: |
        npm install
        VITE_AUTH_API=http://{{ domain }}/api/auth \
        VITE_PERSONAS_API=http://{{ domain }}/api/personas \
        VITE_AUTOMOTORES_API=http://{{ domain }}/api/automotores \
        VITE_INFRACCIONES_API=http://{{ domain }}/api/infracciones \
        VITE_COMPARENDOS_API=http://{{ domain }}/api/comparendos \
        npm run build
      args:
        chdir: "{{ frontend_dir }}/source"
      changed_when: true

    - name: Desplegar archivos construidos
      ansible.builtin.command: >
        rsync -aq {{ frontend_dir }}/source/dist/ {{ frontend_dir }}/
      changed_when: true
  become: true
  become_user: "{{ node_user }}"

- name: Eliminar configuración default
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Configurar Nginx para SIMCOMP
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/simcomp
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Activar sitio SIMCOMP
  ansible.builtin.file:
    src: /etc/nginx/sites-available/simcomp
    dest: /etc/nginx/sites-enabled/simcomp
    state: link
  notify: reload nginx

- name: Habilitar y arrancar Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Firewall rules
  block:
    - community.general.ufw:
        rule: allow
        name: OpenSSH
    - community.general.ufw:
        rule: allow
        name: "Nginx HTTP"
    - community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: [8001, 8002, 8003, 8004, 8005]
    - community.general.ufw:
        state: enabled
        policy: deny

- name: Configurar resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      search {{ domain }}
      nameserver {{ ip_dns }}
      nameserver 8.8.8.8
    mode: "0644"
