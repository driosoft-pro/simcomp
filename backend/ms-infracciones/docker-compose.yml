services:
  db-ms-infracciones:
    image: docker.io/library/postgres:16
    container_name: db-ms-infracciones
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-infracciones_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-infracciones_pass}
      POSTGRES_DB: ${DB_NAME:-infracciones_db}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - infracciones_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infracciones_user} -d ${DB_NAME:-infracciones_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

volumes:
  infracciones_db_data:

networks:
  microservices-net:
    driver: bridge